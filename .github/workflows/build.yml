name: build

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Bun.js
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Audit dependencies
      # Informational only — bun audit lacks a --production flag, and all
      # current advisories are in dev-only deps (semantic-release, knip,
      # lint-staged) that never ship to users. Flip to blocking once bun
      # supports prod-only filtering.
      continue-on-error: true
      run: bun audit --audit-level=high

    - name: Check (lint + format)
      run: bun run check

    - name: Type check
      run: bun run type-check

    - name: Knip
      run: bun run knip

    - name: jscpd
      run: bun run jscpd

    - name: Klint
      run: bun run klint

    - name: Madge
      run: bun run madge

    - name: Line endings
      run: bun run lf

    - name: Tests
      run: bun run test

    - name: Build project
      run: bun run build
